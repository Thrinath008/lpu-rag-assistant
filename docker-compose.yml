version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lpu-rag-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - LOG_LEVEL=INFO
    volumes:
      - ./embeddings:/app/embeddings
      - ./chunks:/app/chunks
      - ./docs_clean:/app/docs_clean
      - ./docs_raw:/app/docs_raw
      - ./auth.db:/app/auth.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: lpu-rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_NAME=LPU Knowledge Assistant
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  embeddings:
  chunks:
  docs_clean:
  docs_raw:
